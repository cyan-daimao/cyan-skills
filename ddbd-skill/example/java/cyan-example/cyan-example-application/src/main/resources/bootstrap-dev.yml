spring:
  config:
    import:
      - "nacos:arch-base.yaml?group=DEFAULT_GROUP&namespace=dev"
      - "nacos:cyan-example.yaml?group=DEFAULT_GROUP&namespace=dev"
  cloud:
    nacos:
      # 通用配置（配置中心和注册中心可共享）
      server-addr: 10.0.0.2:8848  # Nacos服务器地址
      username: nacos  # Nacos登录账号
      password: nacos  # Nacos登录密码
      # 配置中心专项配置
      config:
        file-extension: yaml
        namespace: dev
      # 注册中心专项配置
      discovery:
        ephemeral: true
        namespace: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://10.0.0.2:3306/cyan_dataman